<!-- PWA SERVICE WORKER -->
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE='kasir-dixz-v3';
const ASSETS=['./'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    caches.match(e.request).then(r=>{
      if(r) return r;
      return fetch(e.request).then(res=>{
        if(!res||res.status!==200||res.type==='opaque') return res;
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
        return res;
      }).catch(()=>caches.match('./').then(r=>r||new Response('Offline',{status:503})));
    })
  );
});
`;
  const blob = new Blob([swCode],{type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'./'}).then(()=>{}).catch(()=>{});
})();
</script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#059669;--primary-dark:#047857;--primary-light:#10B981;--primary-glow:rgba(5,150,105,0.22);
  --bg:#F0F4F2;--surface:#fff;--surface-2:#F8FAF9;
  --text:#0D1F1A;--text-2:#4B6B5E;--text-muted:#98B4A8;
  --danger:#EF4444;--danger-dark:#DC2626;--warning:#F59E0B;--success:#10B981;
  --blue:#3B82F6;--blue-dark:#1D4ED8;
  --border:#DDE8E4;
  --shadow-xs:0 1px 3px rgba(0,0,0,.06);
  --shadow-sm:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --shadow-primary:0 6px 20px rgba(5,150,105,.35);
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:26px;
  --tr:all .3s cubic-bezier(.4,0,.2,1);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'Space Mono',monospace;
}

/* ======= SPLASH ======= */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#021F14;overflow:hidden;
  transition:opacity .6s cubic-bezier(.4,0,.2,1),visibility .6s;
}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.sp-bg{position:absolute;inset:0;overflow:hidden}
.sp-orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbFloat 10s ease-in-out infinite}
.sp-orb-1{width:380px;height:380px;background:radial-gradient(circle,rgba(5,150,105,.38) 0%,transparent 70%);top:-140px;left:-120px}
.sp-orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(16,185,129,.22) 0%,transparent 70%);bottom:-100px;right:-100px;animation-delay:-4s}
.sp-orb-3{width:240px;height:240px;background:radial-gradient(circle,rgba(4,120,87,.28) 0%,transparent 70%);top:40%;left:50%;animation-delay:-6s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(15px,-18px) scale(1.03)}
  66%{transform:translate(-12px,13px) scale(.97)}
}
.sp-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(16,185,129,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.03) 1px,transparent 1px);
  background-size:56px 56px;
  animation:gridPulse 7s ease-in-out infinite;
}
@keyframes gridPulse{0%,100%{opacity:.2}50%{opacity:.55}}

/* Logo */
.sp-logo-wrap{
  position:relative;width:128px;height:128px;margin-bottom:40px;
  animation:logoIn 1.1s cubic-bezier(.2,1.3,.4,1) .25s both;
}
@keyframes logoIn{
  0%{transform:scale(.1) rotate(-20deg);opacity:0}
  55%{transform:scale(1.07) rotate(2deg);opacity:1}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
.sp-ring{
  position:absolute;border-radius:50%;
  border:2px solid transparent;
  background:conic-gradient(from 0deg,#059669 0%,#10B981 35%,#34D399 65%,transparent 82%) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
}
.sp-ring-1{inset:-12px;animation:ringR 3s linear infinite}
.sp-ring-2{inset:-24px;border:1.5px solid transparent;background:conic-gradient(from 200deg,rgba(52,211,153,.45) 0%,transparent 50%,rgba(5,150,105,.3) 80%,transparent) border-box;animation:ringR 5s linear infinite reverse}
.sp-ring-3{inset:-36px;border:1px dashed rgba(52,211,153,.14);animation:ringR 14s linear infinite}
@keyframes ringR{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sp-logo-inner{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(145deg,#06b07a 0%,#059669 38%,#047857 68%,#055c42 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(52,211,153,.25),0 0 44px rgba(5,150,105,.7),0 0 88px rgba(5,150,105,.18),inset 0 1px 0 rgba(255,255,255,.3);
}
.sp-logo-inner canvas{width:80px;height:80px;border-radius:50%}
.sp-dot{
  position:absolute;width:14px;height:14px;background:#34D399;
  border-radius:50%;top:8px;right:8px;
  box-shadow:0 0 10px #34D399,0 0 22px rgba(52,211,153,.6);
  animation:dotP 3s ease-in-out infinite;
}
@keyframes dotP{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.8);opacity:.5;box-shadow:0 0 18px #34D399,0 0 36px rgba(52,211,153,.3)}
}

/* Title */
.sp-title-wrap{text-align:center;animation:fadeUp .9s cubic-bezier(.2,1,.4,1) .6s both}
@keyframes fadeUp{
  0%{transform:translateY(30px);opacity:0}
  60%{transform:translateY(-3px);opacity:1}
  100%{transform:translateY(0);opacity:1}
}
.sp-title{font-family:var(--font);font-size:42px;font-weight:800;color:#fff;letter-spacing:-1.2px;line-height:1;margin-bottom:10px}
.sp-title span{background:linear-gradient(135deg,#4ade80,#34D399,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sp-sub{font-size:12px;font-weight:500;color:rgba(255,255,255,.32);letter-spacing:1.2px;text-transform:uppercase}

/* Progress */
.sp-prog-wrap{margin-top:58px;width:200px;animation:fadeUp .8s ease .8s both}
.sp-prog-bar{height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.sp-prog-fill{
  height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,#047857,#059669,#34D399,#6ee7b7);
  background-size:300% 100%;
  box-shadow:0 0 16px rgba(52,211,153,.9);
  animation:progF 2.15s cubic-bezier(.25,.46,.45,.94) .45s forwards, progShimmer 2s linear 1.2s infinite;
}
@keyframes progF{0%{width:0}100%{width:100%}}
@keyframes progShimmer{0%{background-position:300% 0}100%{background-position:-300% 0}}
.sp-prog-text{
  text-align:center;margin-top:13px;font-size:10px;font-weight:600;
  color:rgba(255,255,255,.18);letter-spacing:3px;text-transform:uppercase;font-family:var(--mono);
  animation:blinkTxt 1.6s ease-in-out .7s infinite;
}
@keyframes blinkTxt{0%,100%{opacity:.18}50%{opacity:.5}}
.sp-ver{position:absolute;bottom:36px;font-size:10px;color:rgba(255,255,255,.1);font-family:var(--mono);letter-spacing:1.5px;animation:fadeUp .7s ease 1.1s both}

/* ======= BASE ======= */
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:80px}

/* ======= HEADER ======= */
.header{position:fixed;top:0;left:0;right:0;height:60px;background:var(--primary-dark);display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:1000;box-shadow:0 2px 20px rgba(4,120,87,.4)}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(52,211,153,.6),transparent)}
.header-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:1.5px;text-transform:uppercase}
.header-action{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);border-radius:10px;cursor:pointer;transition:var(--tr);border:1px solid rgba(255,255,255,.08)}
.header-action:hover{background:rgba(255,255,255,.22);transform:scale(1.05)}
.header-action svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.close-camera-btn{position:fixed;top:70px;right:14px;padding:9px 14px;background:var(--danger);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;z-index:1001;display:none;box-shadow:0 4px 14px rgba(239,68,68,.45);transition:var(--tr);font-family:var(--font)}
.close-camera-btn.show{display:flex;align-items:center;gap:6px}

/* ======= SUBPAGE ======= */
.subpage{position:fixed;inset:0;z-index:1500;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding-bottom:40px}
.subpage.open{transform:translateX(0)}
.subpage-header{position:sticky;top:0;z-index:10;background:var(--primary-dark);height:58px;display:flex;align-items:center;padding:0 16px;gap:12px;box-shadow:0 2px 12px rgba(4,120,87,.35)}
.subpage-back{width:36px;height:36px;border:none;background:rgba(255,255,255,.15);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.subpage-back svg{width:20px;height:20px;stroke:#fff;fill:none}
.subpage-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:.3px}
.subpage-body{padding:16px}
@media(min-width:480px){.subpage-body{max-width:480px;margin:0 auto}}

/* ======= MAIN ======= */
.main-content{margin-top:60px;padding:16px;min-height:calc(100vh - 140px)}
@media(min-width:480px){.main-content{max-width:480px;margin-left:auto;margin-right:auto}}
.page{display:none}
.page.active{display:block;animation:pageIn .32s cubic-bezier(.4,0,.2,1)}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ======= BOTTOM NAV ======= */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:68px;background:var(--surface);display:flex;justify-content:space-around;align-items:stretch;z-index:1000;border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;cursor:pointer;transition:var(--tr);position:relative;padding-top:4px;-webkit-tap-highlight-color:transparent}
.nav-item svg{width:22px;height:22px;fill:none;stroke:var(--text-muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:var(--tr);margin-bottom:3px}
.nav-item span{font-size:10px;font-weight:600;color:var(--text-muted);transition:var(--tr);letter-spacing:.3px}
.nav-item.active svg{stroke:var(--primary);transform:scale(1.12) translateY(-1px);filter:drop-shadow(0 2px 4px var(--primary-glow))}
.nav-item.active span{color:var(--primary)}
.nav-item.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:var(--primary);border-radius:0 0 4px 4px;animation:tabLine .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes tabLine{from{width:0;opacity:0}to{width:32px;opacity:1}}
.badge{position:absolute;top:3px;right:calc(50% - 22px);min-width:18px;height:18px;background:var(--danger);color:#fff;border-radius:99px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--surface)}

/* ======= CARDS ======= */
.card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:18px;margin-bottom:14px;border:1px solid rgba(221,232,228,.8)}
.section-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:14px;letter-spacing:-.3px;display:flex;align-items:center;justify-content:space-between}

/* ======= FORMS ======= */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}
.form-input{width:100%;padding:13px 15px;font-size:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--surface-2);color:var(--text);transition:var(--tr);font-family:var(--font);-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 4px var(--primary-glow)}
.form-input::placeholder{color:var(--text-muted)}
.price-wrapper{position:relative}
.price-prefix{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:600;color:var(--text-2);pointer-events:none}
.price-wrapper .form-input{padding-left:38px}

/* ======= BUTTONS ======= */
.btn{width:100%;padding:15px 22px;font-size:15px;font-weight:700;border:none;border-radius:var(--r-sm);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);letter-spacing:.2px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-primary)}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:var(--primary)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

/* ======= WEIGHT ======= */
.weight-row{display:flex;gap:10px;align-items:center}
.weight-input{flex:1}
.weight-unit{padding:13px 16px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-sm);font-weight:700;font-size:13px;color:var(--text-2);cursor:pointer;transition:var(--tr);font-family:var(--font)}
.weight-unit.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ======= BARCODE SCANNER BTN ======= */
.barcode-scanner-btn{width:100%;padding:13px 15px;font-size:13px;font-weight:700;border:1.5px dashed rgba(5,150,105,.4);border-radius:var(--r-sm);background:rgba(5,150,105,.04);color:var(--primary);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-family:var(--font)}
.barcode-scanner-btn:hover{background:rgba(5,150,105,.08);border-color:var(--primary)}
.barcode-scanner-btn svg{width:20px;height:20px}

/* ======= BARCODE DISPLAY ======= */
.barcode-display{background:rgba(5,150,105,.06);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;border:1.5px solid rgba(5,150,105,.3)}
.barcode-display-label{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.barcode-display-value{font-size:15px;font-weight:700;color:var(--primary);font-family:var(--mono);letter-spacing:2px;margin-top:2px}
.barcode-display-clear{width:26px;height:26px;border:none;border-radius:6px;background:var(--danger);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);flex-shrink:0}

/* ======= SCANNER CONTAINER ======= */
.barcode-scanner-container{position:relative;width:100%;height:270px;background:#0A0A0A;border-radius:var(--r-md);overflow:hidden;margin-bottom:14px;border:2px solid rgba(5,150,105,.4)}
.barcode-scanner-container .html5-qrcode-element,
.barcode-scanner-container #html5-code-input,
.barcode-scanner-container #html5-code-product,
.barcode-scanner-container #html5-code-edit{width:100%!important;height:100%!important;position:absolute!important;top:0!important;left:0!important;z-index:1!important}
.barcode-scanner-container video{width:100%!important;height:100%!important;object-fit:cover!important;position:absolute!important;top:0!important;left:0!important;z-index:1!important;display:block!important;visibility:visible!important;opacity:1!important}
.barcode-scanner-container.barcode-scanner-active{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.barcode-scanner-container.barcode-scanner-active::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:210px;height:120px;border:2px solid var(--primary);border-radius:8px;z-index:10;pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.barcode-scanner-container.barcode-scanner-active::after{content:'';position:absolute;top:calc(50% - 60px);left:calc(50% - 105px);width:210px;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);z-index:11;pointer-events:none;animation:scanLine 2.5s ease-in-out infinite;box-shadow:0 0 12px var(--primary)}
@keyframes scanLine{0%{transform:translateY(0);opacity:.5}50%{transform:translateY(118px);opacity:1}100%{transform:translateY(0);opacity:.5}}
.barcode-scanner-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);color:#fff;cursor:pointer;transition:var(--tr);gap:10px}
.barcode-scanner-overlay svg{width:38px;height:38px;stroke:var(--primary-light)}
.barcode-scanner-overlay span{font-size:13px;font-weight:600;color:rgba(255,255,255,.85)}
.barcode-scanner-active .barcode-scanner-overlay{display:none}
.barcode-scan-line{display:none}
.barcode-scanner-controls{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,.7));display:none;justify-content:center}
.barcode-scanner-active .barcode-scanner-controls{display:flex}
.barcode-stop-btn{padding:9px 22px;background:var(--danger);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.scanner-torch-btn{position:absolute;top:10px;right:10px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);cursor:pointer;align-items:center;justify-content:center;z-index:12;transition:var(--tr)}
.scanner-torch-btn.hidden{display:none}.scanner-torch-btn.visible{display:flex}
.scanner-torch-btn.active{background:rgba(255,255,0,.3);border-color:#ff0}
.scanner-torch-btn svg{width:20px;height:20px;stroke:#fff}
.scanner-torch-btn.active svg{stroke:#ff0}

/* ======= BARCODE SEARCH RESULT ======= */
.barcode-search-result{background:rgba(5,150,105,.06);border:1.5px solid rgba(5,150,105,.3);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;display:none;align-items:center;gap:12px}
.barcode-search-result.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.barcode-search-result-icon{width:38px;height:38px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.barcode-search-result-icon svg{width:20px;height:20px;stroke:#fff}
.barcode-search-result-info{flex:1;min-width:0}
.barcode-search-result-name{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barcode-search-result-barcode{font-size:11px;color:var(--primary);font-family:var(--mono);margin-top:2px}
.barcode-search-result-price{font-size:15px;font-weight:800;color:var(--primary);flex-shrink:0}

/* ======= CAMERA ======= */
.camera-container{position:relative;width:100%;height:200px;background:var(--surface-2);border-radius:var(--r-md);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;border:1.5px solid var(--border)}
.camera-video,.camera-preview{width:100%;height:100%;object-fit:cover;display:none}
.camera-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-2);cursor:pointer;transition:var(--tr)}
.camera-placeholder svg{width:44px;height:44px;stroke:var(--text-muted)}
.camera-placeholder span{font-size:13px;font-weight:600}
.camera-controls{position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.5));display:none;justify-content:center;gap:14px}
.camera-controls.active{display:flex}
.camera-btn{width:54px;height:54px;border-radius:50%;border:3px solid rgba(255,255,255,.9);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center}
.camera-btn-capture{background:var(--danger)}.camera-btn-capture:active{transform:scale(.88)}
.camera-btn-switch,.camera-btn-flash{background:rgba(255,255,255,.25);width:42px;height:42px;margin-top:6px}
.camera-btn-switch svg,.camera-btn-flash svg{width:22px;height:22px;stroke:#fff}
.camera-btn-flash.active{background:rgba(255,255,0,.35)}.camera-btn-flash.active svg{stroke:#ff0}
.capture-btn-inner{width:38px;height:38px;border-radius:50%;background:#fff}
.camera-actions{display:flex;gap:10px;margin-top:10px}
.camera-action-btn{flex:1;padding:12px;font-size:13px;font-weight:700;border:none;border-radius:var(--r-sm);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font)}
.btn-gallery{background:var(--surface-2);color:var(--text);border:1.5px solid var(--border)}
.btn-camera{background:var(--primary);color:#fff}

/* ======= PRODUCT GRID ======= */
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.product-card{background:var(--surface);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden;transition:var(--tr);display:flex;flex-direction:column;border:1px solid var(--border)}
.product-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.product-image{width:100%;height:130px;object-fit:cover;background:var(--surface-2)}
.product-info{padding:11px;flex:1;display:flex;flex-direction:column}
.product-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-barcode{font-size:10px;color:var(--primary);font-family:var(--mono);margin-bottom:3px;letter-spacing:1px}
.product-price{font-size:14px;font-weight:800;color:var(--primary);margin-bottom:3px}
.product-qty-badge{font-size:10px;color:var(--blue);font-weight:700;margin-bottom:3px}
.product-weight{font-size:10px;color:var(--text-muted);margin-bottom:8px;font-weight:500}
.product-actions{display:flex;gap:6px;margin-top:auto}
.product-btn{flex:1;padding:9px 6px;font-size:11px;font-weight:700;border:none;border-radius:var(--r-sm);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:3px;font-family:var(--font)}
.product-btn:active{transform:scale(.95)}
.product-btn-cart{background:var(--primary);color:#fff}
.product-btn-delete{background:rgba(239,68,68,.1);color:var(--danger)}
.product-btn-delete:hover{background:var(--danger);color:#fff}
.product-btn svg{width:14px;height:14px}

/* ======= DUPLICATE NOTIF ======= */
.dup-notif{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:linear-gradient(135deg,#1E40AF,#1D4ED8);
  color:#fff;border-radius:var(--r-md);
  padding:14px 16px;max-width:calc(100vw - 28px);width:360px;
  box-shadow:0 8px 30px rgba(29,78,216,.45),0 2px 8px rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.15);
  z-index:2001;
  opacity:0;visibility:hidden;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:flex-start;gap:12px;
}
.dup-notif.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.dup-notif-icon{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dup-notif-icon svg{width:18px;height:18px;stroke:#fff}
.dup-notif-body{flex:1;min-width:0}
.dup-notif-title{font-size:13px;font-weight:800;margin-bottom:4px}
.dup-notif-msg{font-size:12px;opacity:.85;font-weight:500;line-height:1.5}
.dup-notif-close{
  width:28px;height:28px;border:none;
  background:rgba(255,255,255,.15);border-radius:7px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:var(--tr);
}
.dup-notif-close:hover{background:rgba(255,255,255,.3)}
.dup-notif-close svg{width:14px;height:14px;stroke:#fff}

/* ======= EDIT LOCK TOGGLE ======= */
.edit-lock-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.toggle-track{width:40px;height:22px;background:#ccc;border-radius:99px;position:relative;transition:var(--tr);flex-shrink:0}
.toggle-track.on{background:var(--primary)}
.toggle-knob{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:var(--tr);box-shadow:var(--shadow-xs)}
.toggle-track.on .toggle-knob{transform:translateX(18px)}
.toggle-label{font-size:12px;font-weight:700;color:var(--text-muted)}
.toggle-track.on+.toggle-label{color:var(--primary)}

/* ======= SEARCH ======= */
.search-container{position:relative;margin-bottom:14px}
.search-input{padding:13px 15px 13px 42px!important}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-muted);pointer-events:none}

/* ======= CART ======= */
.cart-item{display:flex;align-items:center;padding:12px;background:var(--surface);border-radius:var(--r-md);margin-bottom:8px;box-shadow:var(--shadow-xs);border:1px solid var(--border);transition:var(--tr)}
.cart-item-image{width:56px;height:56px;object-fit:cover;border-radius:var(--r-sm);margin-right:12px;flex-shrink:0}
.cart-item-details{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-price{font-size:12px;color:var(--text-2);margin-top:2px;font-weight:500}
.cart-item-weight{font-size:12px;color:var(--primary);font-weight:600;margin-top:1px}
.cart-item-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface-2);color:var(--text);font-size:16px;font-weight:700;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.remove-item-btn{width:28px;height:28px;border:none;border-radius:7px;background:rgba(239,68,68,.1);color:var(--danger);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center}
.remove-item-btn:hover{background:var(--danger);color:#fff}
.remove-item-btn svg{width:13px;height:13px;stroke:currentColor}

/* ======= MANUAL INPUT ======= */
.manual-input-section{background:linear-gradient(135deg,#1E40AF,#1D4ED8);border-radius:var(--r-md);padding:16px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.manual-input-section::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.manual-input-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;position:relative}
.manual-input{width:100%;padding:13px 14px;font-size:17px;font-weight:700;border:1.5px solid rgba(255,255,255,.25);border-radius:var(--r-sm);background:rgba(255,255,255,.1);color:#fff;text-align:right;margin-bottom:6px;font-family:var(--mono)}
.manual-input:focus{outline:none;border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.15)}
.manual-input::placeholder{color:rgba(255,255,255,.5)}
.manual-summary{display:flex;justify-content:space-between;font-size:12px;opacity:.9;position:relative}
.manual-summary span:last-child{font-weight:800;font-size:15px}
.add-manual-btn{width:100%;padding:11px;margin-top:10px;background:rgba(255,255,255,.15);border:1.5px dashed rgba(255,255,255,.45);border-radius:var(--r-sm);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);position:relative}
.add-manual-btn:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.7)}
.manual-cart-item{display:flex;align-items:center;padding:12px 14px;background:linear-gradient(135deg,#1E40AF,#1D4ED8);border-radius:var(--r-sm);margin-bottom:8px;color:#fff}
.manual-cart-item-details{flex:1}
.manual-cart-item-name{font-size:13px;font-weight:700}
.manual-cart-item-price{font-size:12px;opacity:.9;font-weight:500;margin-top:1px}
.manual-cart-item-remove{width:26px;height:26px;border:none;border-radius:6px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center}

/* ======= SUMMARY ======= */
.summary-section{background:var(--primary-dark);border-radius:var(--r-md);padding:18px;color:#fff;margin-top:14px;position:relative;overflow:hidden}
.summary-section::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:relative}
.summary-row:last-child{margin-bottom:0;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)}
.summary-label{font-size:13px;opacity:.85;font-weight:500}
.summary-value{font-size:15px;font-weight:700}
.summary-total{font-size:22px;font-weight:800}
.payment-section{margin-top:14px}
.payment-input{width:100%;padding:15px 15px 15px 38px;font-size:18px;font-weight:700;border:1.5px solid var(--border);border-radius:var(--r-sm);text-align:right;font-family:var(--font);color:var(--text);background:var(--surface-2)}
.payment-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-glow)}
.change-display{padding:11px 14px;border-radius:var(--r-sm);margin-top:8px;font-weight:700;font-size:14px;text-align:right;transition:var(--tr);border:1.5px solid transparent}
.change-positive{background:rgba(16,185,129,.08);color:var(--success);border-color:rgba(16,185,129,.2)}
.change-negative{background:rgba(239,68,68,.08);color:var(--danger);border-color:rgba(239,68,68,.2)}

/* ======= DEBT ======= */
.debt-form{background:var(--surface);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.debt-summary-section{background:var(--surface);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.debt-summary-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.debt-summary-table{width:100%;border-collapse:collapse}
.debt-summary-table th{text-align:left;font-size:11px;font-weight:700;color:var(--text-2);padding:7px 4px;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.debt-summary-table td{padding:10px 4px;font-size:14px;border-bottom:1px solid var(--border);color:var(--text)}
.debt-summary-table td:last-child{text-align:right;font-weight:800;color:var(--danger)}
.debt-summary-table tr:last-child td{border-bottom:none}
.debt-list{margin-top:14px}
.debt-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--surface);border-radius:var(--r-md);margin-bottom:8px;box-shadow:var(--shadow-xs);border:1px solid var(--border);transition:var(--tr)}
.debt-info{flex:1;min-width:0}
.debt-name{font-size:15px;font-weight:700;color:var(--text)}
.debt-desc{font-size:12px;color:var(--text-2);margin-top:2px;font-weight:500}
.debt-date{font-size:10px;color:var(--text-muted);margin-top:3px}
.debt-amount{font-size:15px;font-weight:800;color:var(--danger);margin-left:10px;flex-shrink:0}
.debt-actions{display:flex;gap:6px;margin-left:10px}
.debt-action-btn{width:34px;height:34px;border:none;border-radius:8px;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center}
.debt-share-btn{background:rgba(5,150,105,.1);color:var(--primary)}
.debt-share-btn:hover{background:var(--primary);color:#fff}
.debt-delete-btn{background:rgba(239,68,68,.1);color:var(--danger)}
.debt-delete-btn:hover{background:var(--danger);color:#fff}
.debt-action-btn svg{width:16px;height:16px;stroke:currentColor;fill:none}

/* ======= TRANSACTIONS ======= */
.transaction-item{background:var(--surface);border-radius:var(--r-md);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:var(--tr)}
.transaction-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.transaction-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.transaction-date{font-size:12px;color:var(--text-2);font-weight:500}
.transaction-total{font-size:17px;font-weight:800;color:var(--primary)}
.transaction-items{border-top:1px solid var(--border);padding-top:10px}
.transaction-product{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);padding:3px 0;font-weight:500}
.transaction-delete-btn{margin-top:10px;padding:8px 14px;font-size:12px;font-weight:700;border:1.5px solid rgba(239,68,68,.3);border-radius:var(--r-sm);background:rgba(239,68,68,.06);color:var(--danger);cursor:pointer;width:100%;transition:var(--tr);font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
.transaction-delete-btn:hover{background:var(--danger);color:#fff}

/* ======= EMPTY STATE ======= */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;text-align:center}
.empty-state svg{width:72px;height:72px;stroke:var(--text-muted);margin-bottom:14px;opacity:.6}
.empty-state h3{font-size:16px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--text-muted);font-weight:500}

/* ======= TOAST ======= */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:11px 22px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);z-index:3000;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:88%;text-align:center;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ======= MODALS ======= */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;visibility:hidden;transition:var(--tr);padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--surface);border-radius:var(--r-xl);padding:24px;max-width:360px;width:100%;transform:scale(.92) translateY(16px);transition:var(--tr);box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
.modal-overlay.show .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:18px;font-weight:800;margin-bottom:10px;color:var(--text)}
.modal-content{font-size:14px;color:var(--text-2);margin-bottom:20px;font-weight:500;line-height:1.5}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1}
.weight-modal-product{background:var(--surface-2);border-radius:var(--r-sm);padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.weight-modal-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.weight-modal-info{font-size:13px;color:var(--text-2);font-weight:500}
.weight-modal-price{color:var(--primary);font-weight:700}
.weight-input-section{display:flex;gap:10px;align-items:center;margin-top:12px}
.weight-input-section .form-input{flex:1}
.weight-input-section .weight-unit{padding:13px 14px;flex-shrink:0}
.weight-preview{background:rgba(5,150,105,.06);border-radius:var(--r-sm);padding:12px 14px;margin-top:12px;text-align:center;border:1.5px solid rgba(5,150,105,.2)}
.weight-preview-text{font-size:12px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.weight-preview-price{font-size:22px;font-weight:800;color:var(--primary);margin-top:3px}

/* ======= EDIT MODAL PHOTO ======= */
.edit-modal-photo-placeholder{width:100%;height:140px;border-radius:var(--r-md);background:var(--surface-2);margin-bottom:14px;cursor:pointer;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-2)}
.edit-modal-photo-placeholder svg{width:32px;height:32px;stroke:var(--text-muted)}
.edit-modal-photo-placeholder span{font-size:12px;font-weight:600}
.edit-camera-actions{display:flex;gap:8px;margin-bottom:14px}
.edit-camera-actions button{flex:1;padding:10px;font-size:12px;font-weight:700;border:none;border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;transition:var(--tr)}
.edit-cam-btn{background:var(--primary);color:#fff}
.edit-gal-btn{background:var(--surface-2);color:var(--text);border:1.5px solid var(--border)}

/* ======= PROFILE ======= */
.profile-header{background:linear-gradient(135deg,var(--primary-dark),#023D28);border-radius:var(--r-xl);padding:24px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.profile-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.profile-avatar-wrap{position:relative;width:88px;height:88px;margin:0 auto 14px;cursor:pointer}
.profile-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-avatar-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}
.profile-avatar-edit svg{width:14px;height:14px;stroke:#fff}
.profile-name{text-align:center;font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;position:relative}
.profile-sub{text-align:center;font-size:12px;color:rgba(255,255,255,.6);font-weight:500;position:relative}
.profile-info-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.profile-info-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.profile-info-row:last-child{border-bottom:none;padding-bottom:0}
.profile-info-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-info-icon.green{background:rgba(5,150,105,.1)}.profile-info-icon.green svg{stroke:var(--primary)}
.profile-info-icon.blue{background:rgba(59,130,246,.1)}.profile-info-icon.blue svg{stroke:var(--blue)}
.profile-info-icon.orange{background:rgba(245,158,11,.1)}.profile-info-icon.orange svg{stroke:var(--warning)}
.profile-info-icon svg{width:18px;height:18px;stroke-width:2}
.profile-info-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.profile-info-value{font-size:14px;font-weight:600;color:var(--text);margin-top:1px}
.profile-info-input{font-size:14px;font-weight:600;color:var(--text);border:none;background:transparent;font-family:var(--font);width:100%;outline:none;padding:0}
.profile-info-input::placeholder{color:var(--text-muted)}
.profile-edit-btn{width:28px;height:28px;border:none;background:rgba(5,150,105,.1);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);flex-shrink:0;margin-left:auto}
.profile-edit-btn:hover{background:var(--primary)}.profile-edit-btn svg{width:14px;height:14px;stroke:var(--primary)}
.profile-edit-btn:hover svg{stroke:#fff}
.profile-save-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;transition:var(--tr);font-family:var(--font);margin-top:10px}
.profile-save-btn:hover{background:var(--primary-dark)}
.profile-save-btn.hidden-save{display:none}

/* ======= STATS ======= */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--r-md);padding:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card:active{transform:scale(.97)}
.stat-card::after{content:'›';position:absolute;top:12px;right:12px;font-size:16px;color:var(--text-muted);font-weight:700}
.stat-card-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.stat-card-value{font-size:18px;font-weight:800;color:var(--text)}
.stat-card-value.green{color:var(--primary)}
.stat-card-value.red{color:var(--danger)}
.stat-card-value.blue{color:var(--blue)}
.stat-card-value.orange{color:var(--warning)}
.stat-card-sub{font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:500}

/* ======= CHART ======= */
.chart-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
.chart-period-tabs{display:flex;gap:6px;margin-bottom:14px}
.chart-tab{padding:7px 14px;font-size:12px;font-weight:700;border:1.5px solid var(--border);border-radius:99px;background:transparent;color:var(--text-2);cursor:pointer;transition:var(--tr);font-family:var(--font)}
.chart-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ======= SUBPAGE SPECIFIC ======= */
.balance-hero{background:linear-gradient(135deg,var(--primary-dark),#023D28);border-radius:var(--r-xl);padding:28px 20px;text-align:center;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.balance-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
.balance-label{font-size:13px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.balance-amount{font-size:38px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1.1}
.balance-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:6px}
.balance-stats-row{display:flex;gap:10px;margin-top:14px}
.balance-stat{flex:1;background:rgba(255,255,255,.1);border-radius:var(--r-sm);padding:10px;text-align:center}
.balance-stat-val{font-size:16px;font-weight:800;color:#fff}
.balance-stat-lbl{font-size:10px;color:rgba(255,255,255,.7);font-weight:600;margin-top:2px}

/* ======= IMPROVED TABLE STYLES ======= */
.nice-table-wrap{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border);margin-bottom:14px}
.nice-table-head{background:linear-gradient(135deg,var(--primary-dark),#023D28);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.nice-table-head-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.nice-table-head-count{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.15);padding:3px 10px;border-radius:99px}
.nice-table{width:100%;border-collapse:collapse}
.nice-table th{background:var(--surface-2);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.nice-table th:last-child,.nice-table td:last-child{text-align:right}
.nice-table td{padding:13px 14px;font-size:13px;color:var(--text);border-bottom:1px solid rgba(221,232,228,.5);vertical-align:middle}
.nice-table tr:last-child td{border-bottom:none}
.nice-table tr:nth-child(even) td{background:rgba(240,244,242,.5)}
.nice-table tr:hover td{background:rgba(5,150,105,.04)}
.nice-no{font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface-2);width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center}
.nice-date{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px}
.nice-amount{font-size:14px;font-weight:800;color:var(--primary)}
.nice-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.nice-badge-green{background:rgba(5,150,105,.1);color:var(--primary)}
.nice-items-preview{font-size:12px;color:var(--text-2);font-weight:500;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

.today-hero{background:linear-gradient(135deg,#1E40AF,#1D4ED8);border-radius:var(--r-xl);padding:24px 20px;text-align:center;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.today-hero::before{content:'';position:
